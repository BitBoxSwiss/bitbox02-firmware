[package]
name = "bitbox02-bootloader"
version = "0.1.0"
edition = "2024"

[dependencies]
bitbox-bytequeue = { path = "../../bitbox-bytequeue" }
bitbox-da14531 = { path = "../../bitbox-da14531" }
bitbox-framed-serial-link = { path = "../../bitbox-framed-serial-link" }
bitbox02 = { path = "../../bitbox02" }
bitbox02-rust-c = { path = "../../bitbox02-rust-c" }
bitbox02-sys = { path = "../../bitbox02-sys" }

[features]
default = []

platform-bitbox02plus = ["bitbox02-sys/platform-bitbox02plus"]
bootloader-devdevice = ["bitbox02-sys/bootloader-devdevice"]
bootloader-production = ["bitbox02-sys/bootloader-production"]
product-multi = ["bitbox02-sys/product-multi"]
product-btconly = ["bitbox02-sys/product-btconly"]
build-bootloader = ["bitbox02-sys/build-bootloader"]

