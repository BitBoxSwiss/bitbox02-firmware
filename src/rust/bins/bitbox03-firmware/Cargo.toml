[package]
name = "bitbox03-firmware"
version = "0.1.0"
edition = "2024"

[features]
rtt = ["bitbox03-boot-utils/rtt", "dep:rtt-target"]

[dependencies]
bitbox-lvgl = { path = "../../bitbox-lvgl", features = ["config-firmware", "st-ltdc"] }
bitbox-hal = { path="../../bitbox-hal"}
bitbox-executor = { path = "../../bitbox-executor" }
bitbox-platform-stm32u5 = { path = "../../bitbox-platform-stm32u5" }
bitbox02-rust = { path = "../../bitbox02-rust", features = ["firmware"] }
bitbox03 = { path = "../../bitbox03" }
bitbox03-boot-utils = { path = "../../bitbox03-boot-utils" }
bitbox-board-stm32u5-dk = { path = "../../bitbox-board-stm32u5-dk" }
bitbox-mcu-stm32u5 = { path = "../../bitbox-mcu-stm32u5" }
cortex-m-rt = "0.7"
cortex-m = { version = "0.7", features = ["critical-section-single-core"]}
arrayvec = {version = "0.7", default-features = false}
embedded-alloc = { version = "0.7" }
log = { version = "0.4.22", default-features = false }
rtt-target = { version = "0.6.1", features = ["log"], optional = true }
[build-dependencies]
bitbox-board-stm32u5-dk-build = { path = "../../bitbox-board-stm32u5-dk-build" }
