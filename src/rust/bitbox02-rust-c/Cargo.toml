# SPDX-License-Identifier: Apache-2.0

[package]
name = "bitbox02-rust-c"
version = "0.1.0"
authors = ["Shift Crypto AG <support@bitbox.swiss>"]
edition = "2024"
license = "Apache-2.0"

[dependencies]
bitbox-core-utils = { path = "../bitbox-core-utils" }
bitbox02-rust = { path = "../bitbox02-rust", optional = true }
bitbox-usb-report-queue = { path = "../bitbox-usb-report-queue" }
bitbox-bytequeue = { path = "../bitbox-bytequeue" }
bitbox-da14531 = { path = "../bitbox-da14531" }
bitbox-aes = { path = "../bitbox-aes", optional = true }
bitbox02 = { path = "../bitbox02" }
bitbox-hal = { path = "../bitbox-hal" }
bitbox-noise = { path = "../bitbox-noise", optional = true }
cortex-m = { workspace = true }
util = { path = "../util" }
bitbox-framed-serial-link = { path = "../bitbox-framed-serial-link" }
hex = { workspace = true }
grounded = { workspace = true }
sha2 = { workspace = true, optional = true }
digest = { workspace = true, optional = true }
bitcoin = { workspace = true, optional = true }
bip39 = { workspace = true }
zeroize = { workspace = true }

[features]
platform-bitbox02 = []
platform-bitbox02plus = ["util/sha2", "bitbox-noise", "bitbox02-rust"]

bootloader = []
firmware = [
  "bitbox02-rust",
  "bitbox02-rust/firmware",
  "bitbox-noise",
  "util/sha2",
  "util/firmware",
  "bitbox-aes",
]

# Only to be enabled in Rust unit tests.
testing = ["bitbox02-rust/testing", "bitbox02/testing"]

# Active when the Rust code is compiled to be linked into the C unit tests and simulator.
c-unit-testing = ["bitbox02-rust/c-unit-testing", "bitbox02/c-unit-testing", "util/c-unit-testing"]

simulator-graphical = [
  "app-bitcoin",
  "app-litecoin",
  "app-ethereum",
  "app-cardano",
  "firmware",
]

app-ethereum = [
  # enable this feature in the deps
  "bitbox02-rust/app-ethereum",
  "bitbox02/app-ethereum",
]

app-bitcoin = [
  # enable this feature in the deps
  "bitbox02-rust/app-bitcoin",
]

app-litecoin = [
  # enable this feature in the deps
  "bitbox02-rust/app-litecoin",
]

app-u2f = [
  # enable this feature in the deps
  "bitbox02-rust/app-u2f",
  "util/p256",
]

app-cardano = [
 # enable this feature in the deps
  "bitbox02-rust/app-cardano",
]

factory-setup = [
  "firmware",
  "platform-bitbox02",
  "dep:bitcoin",
  "bitbox02/factory-setup",
]

rtt = ["util/rtt"]
