# SPDX-License-Identifier: Apache-2.0

[package]
name = "bitbox02"
version = "0.1.0"
authors = ["Shift Crypto AG <support@bitbox.swiss>"]
edition = "2024"
description = "Idiomatic rust bindings for C code in bitbox02-firmware"
license = "Apache-2.0"

[dependencies]
bitbox02-sys = {path="../bitbox02-sys"}
bitbox-securechip = { path = "../bitbox-securechip" }
bitbox-securechip-sys = { path = "../bitbox-securechip-sys" }
bitbox-noise = { path = "../bitbox-noise" }
bitbox-hal = { path = "../bitbox-hal" }
bitbox-bytequeue = { path = "../bitbox-bytequeue" }
bitbox-framed-serial-link = { path = "../bitbox-framed-serial-link" }
bitbox-usb-report-queue = { path = "../bitbox-usb-report-queue" }
util = {path = "../util"}
zeroize = { workspace = true }
bip39 = { workspace = true }
futures-lite = { workspace = true }
grounded = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
hex_lit = { workspace = true, features = ["rust_v_1_46"] }

[dev-dependencies]
async_test = { path = "../async_test" }
bitbox-aes = { path = "../bitbox-aes" }
bitbox-framed-serial-link = { path = "../bitbox-framed-serial-link" }

[features]
# Only to be enabled in unit tests and simulators
testing = ["util/testing"]
# Enables UI stubs for rust unit tests
unit-testing = []
# Active when the Rust code is compiled to be linked into the C unit tests and simulator.
c-unit-testing = []
# Active when building for the graphical simulator
simulator-graphical = []

app-ethereum = []
app-bitcoin = []
app-litecoin = []
app-u2f = ["bitbox-hal/app-u2f", "bitbox-securechip/app-u2f"]
