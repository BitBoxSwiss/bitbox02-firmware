[package]
name = "bitbox03"
version = "0.1.0"
edition = "2024"

[dependencies]
bitbox-lvgl = { path = "../bitbox-lvgl" }
bitbox-hal = { path = "../bitbox-hal" }
util = { path = "../util" }
tracing = { version = "0.1.41", features = ["log"], default-features = false }
png-decoder = { version="0.2"}
zeroize = {workspace=true}

[features]
app-u2f = ["bitbox-hal/app-u2f"]
